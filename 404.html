<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Escape Velocity Studio</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0f1a;
      color: #e0e4ed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: clamp(80px, 15vw, 200px);
      font-weight: 900;
      color: #7df3ff;
      letter-spacing: -6px;
      text-shadow: 0 0 4px #fff, 0 0 10px #7df3ff, 0 0 25px #7df3ff, 0 0 50px #0fa8c4;
      margin-bottom: 24px;
    }
    p {
      font-size: 20px;
      color: #8892a8;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .punch {
      font-size: 24px;
      font-weight: 900;
      color: #f0f2f8;
      margin-bottom: 40px;
    }
    a {
      display: inline-block;
      padding: 14px 32px;
      background: #7df3ff;
      color: #0b0f1a;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.2s;
    }
    a:hover { background: #b8f8ff; }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>This page doesn't exist.</p>
    <p class="punch">Probably got shipped before it was ready.</p>
    <a href="/">Back to the homepage</a>
  </div>
</body>
</html>
